services:
  relay:
    image: ghcr.io/maximeliseyev/construct-relay:latest
    ports:
      # Primary listener: container :443 → host :443 (or LISTEN_PORT override)
      - "${LISTEN_PORT:-443}:443"
      # Alt listener: direct obfs4 bypass (no CDN). Container binds :9894 internally,
      # mapped to ALT_LISTEN_PORT on the host (default: 52143).
      - "${ALT_LISTEN_PORT:-52143}:9894"
    volumes:
      - relay_data:/data
    environment:
      UPSTREAM: ${UPSTREAM}
      UPSTREAM_TLS: ${UPSTREAM_TLS:-true}
      STATE_DIR: /data
      # TLS SNI: pick a domain plausible for the VPS host's network range.
      TLS_SNI_HOST: ${TLS_SNI_HOST:-fra1.digitaloceanspaces.com}
      # WebTunnel: enable only with real CDN fronting (bare IP triggers active probing).
      WT_PATH: ${WT_PATH:-}
      # Alt obfs4 listener inside container (mapped to ALT_LISTEN_PORT on host).
      ALT_LISTEN_ADDR: ${ALT_LISTEN_ADDR:-0.0.0.0:9894}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  relay_data:
