services:
  relay:
    image: ghcr.io/maximeliseyev/construct-relay:latest
    ports:
      - "${LISTEN_PORT:-443}:443"
    volumes:
      - relay_data:/data
    environment:
      UPSTREAM: ${UPSTREAM}
      UPSTREAM_TLS: ${UPSTREAM_TLS:-true}
      STATE_DIR: /data
      TLS_SNI_HOST: ${TLS_SNI_HOST:-storage.yandexcloud.net}
      WT_PATH: ${WT_PATH:-/construct-ice}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  relay_data:
